name: storm
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  # Scientific / meteorology stack
  - metpy=1.7.1
  - scipy=1.17.1
  - numpy=2.4.2
  - matplotlib-base=3.10.8
  - pandas=3.0.1
  - xarray=2026.2.0
  - cartopy=0.25.0
  - pyproj=3.7.2
  - shapely=2.1.2
  - pillow=12.1.1
  # Networking
  - paho-mqtt=2.1.0
  - requests=2.32.5
  - boto3=1.42.59         # AWS S3 (future use)
  # Utilities
  - pyserial             # GPS (NMEA via serial port)
  - pynmea2              # NMEA sentence parsing
  # Windows runtime dependencies (handled by conda-forge automatically,
  # listed here for clarity — do NOT add xorg-*, libgcc, libgfortran,
  # llvm-openmp, or other Linux/macOS-only libs)
  - pip
  - pip:
      # Qt UI — PyPI wheels are the most reliable source for PyQt6-WebEngine on Windows
      - pyqt6==6.10.2
      - pyqt6-qt6==6.10.2
      - pyqt6-sip==13.11.0
      - pyqt6-webengine==6.10.0
      - pyqt6-webengine-qt6==6.10.2
      # Web server (local tile/asset server)
      - flask==3.1.3
      - werkzeug==3.1.6
